name: Scrape Job Boards

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      board_group:
        description: 'Single board group to run (leave blank for all)'
        required: false
        default: ''

concurrency:
  group: readme-updates
  cancel-in-progress: false

jobs:
  scrape-greenhouse:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.board_group == '' || github.event.inputs.board_group == 'greenhouse' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pyyaml
      - name: Scrape Greenhouse
        timeout-minutes: 50
        env:
          BOARD_GROUP: greenhouse
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PRIORITY_ALERT_WEBHOOK_URL: ${{ secrets.PRIORITY_ALERT_WEBHOOK_URL }}
        run: python .github/scripts/scrape_jobs.py
      - name: Commit data files
        run: |
          git config user.name "Aprameya Kannan"
          git config user.email "aprameyakannan@gmail.com"
          git add .github/data/seen_jobs_greenhouse.json .github/data/title_classifications.json .github/data/gemini_usage.json .github/data/followed_companies.json .github/data/pending_greenhouse.json
          if ! git diff --staged --quiet; then
            git commit -m "scraper data: greenhouse"
            for i in 1 2 3 4 5; do git pull --rebase -X ours && git push && break; sleep $((i*5)); done
          fi

  scrape-ashby:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.board_group == '' || github.event.inputs.board_group == 'ashby' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pyyaml
      - name: Scrape Ashby
        timeout-minutes: 30
        env:
          BOARD_GROUP: ashby
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PRIORITY_ALERT_WEBHOOK_URL: ${{ secrets.PRIORITY_ALERT_WEBHOOK_URL }}
        run: python .github/scripts/scrape_jobs.py
      - name: Commit data files
        run: |
          git config user.name "Aprameya Kannan"
          git config user.email "aprameyakannan@gmail.com"
          git add .github/data/seen_jobs_ashby.json .github/data/title_classifications.json .github/data/gemini_usage.json .github/data/pending_ashby.json
          if ! git diff --staged --quiet; then
            git commit -m "scraper data: ashby"
            for i in 1 2 3 4 5; do git pull --rebase -X ours && git push && break; sleep $((i*5)); done
          fi

  scrape-workday:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.board_group == '' || github.event.inputs.board_group == 'workday' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pyyaml
      - name: Scrape Workday
        timeout-minutes: 55
        env:
          BOARD_GROUP: workday
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PRIORITY_ALERT_WEBHOOK_URL: ${{ secrets.PRIORITY_ALERT_WEBHOOK_URL }}
        run: python .github/scripts/scrape_jobs.py
      - name: Commit data files
        run: |
          git config user.name "Aprameya Kannan"
          git config user.email "aprameyakannan@gmail.com"
          git add .github/data/seen_jobs_workday.json .github/data/title_classifications.json .github/data/gemini_usage.json .github/data/pending_workday.json
          if ! git diff --staged --quiet; then
            git commit -m "scraper data: workday"
            for i in 1 2 3 4 5; do git pull --rebase -X ours && git push && break; sleep $((i*5)); done
          fi

  scrape-linkedin-amazon:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.board_group == '' || github.event.inputs.board_group == 'linkedin_amazon' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pyyaml
      - name: Scrape LinkedIn and Amazon
        timeout-minutes: 55
        env:
          BOARD_GROUP: linkedin_amazon
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          PRIORITY_ALERT_WEBHOOK_URL: ${{ secrets.PRIORITY_ALERT_WEBHOOK_URL }}
        run: python .github/scripts/scrape_jobs.py
      - name: Commit data files
        run: |
          git config user.name "Aprameya Kannan"
          git config user.email "aprameyakannan@gmail.com"
          git add .github/data/seen_jobs_linkedin_amazon.json .github/data/title_classifications.json .github/data/gemini_usage.json .github/data/pending_linkedin_amazon.json
          if ! git diff --staged --quiet; then
            git commit -m "scraper data: linkedin_amazon"
            for i in 1 2 3 4 5; do git pull --rebase -X ours && git push && break; sleep $((i*5)); done
          fi

  scrape-other:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.board_group == '' || github.event.inputs.board_group == 'other' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pyyaml
      - name: Scrape Lever / SmartRecruiters / Workable / Recruitee / Pinpoint
        timeout-minutes: 40
        env:
          BOARD_GROUP: other
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PRIORITY_ALERT_WEBHOOK_URL: ${{ secrets.PRIORITY_ALERT_WEBHOOK_URL }}
        run: python .github/scripts/scrape_jobs.py
      - name: Commit data files
        run: |
          git config user.name "Aprameya Kannan"
          git config user.email "aprameyakannan@gmail.com"
          git add .github/data/seen_jobs_other.json .github/data/title_classifications.json .github/data/gemini_usage.json .github/data/pending_other.json
          if ! git diff --staged --quiet; then
            git commit -m "scraper data: other"
            for i in 1 2 3 4 5; do git pull --rebase -X ours && git push && break; sleep $((i*5)); done
          fi

  apply:
    # Runs after all scrape jobs finish (even if some fail/timeout).
    # Pulls the latest commits from all scrape jobs, merges all pending_*.json
    # files into listings.json, rebuilds README, and commits once.
    needs: [scrape-greenhouse, scrape-ashby, scrape-workday, scrape-linkedin-amazon, scrape-other]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_PAT }}
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pyyaml
      - name: Apply pending discoveries to listings.json
        run: python .github/scripts/apply_pending.py
      - name: Commit listings and README
        run: |
          git config user.name "Aprameya Kannan"
          git config user.email "aprameyakannan@gmail.com"
          git add listings.json README.md .github/data/
          git diff --staged --quiet || (git commit -m "add auto-discovered listings and update scraper data" && git pull --rebase -X ours && git push)
